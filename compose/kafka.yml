services:
  kafka:
    image: confluentinc/cp-kafka:${CP_KAFKA_VERSION}
    hostname: kafka
    container_name: kafka
    ports:
      - "${KAFKA_HOST_PORT}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - lakehouse

  schema-registry:
    image: confluentinc/cp-schema-registry:${CP_SCHEMA_REGISTRY_VERSION}
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_HOST_PORT}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - lakehouse

  kafka-init:
    image: confluentinc/cp-kafka:${CP_KAFKA_VERSION}
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["bash", "/init-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_PRODUCTS: ${KAFKA_TOPIC_PRODUCTS}
      KAFKA_TOPIC_INVENTORY: ${KAFKA_TOPIC_INVENTORY}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS}
      KAFKA_TOPIC_REPLICATION: ${KAFKA_TOPIC_REPLICATION}
      KAFKA_TOPIC_RETENTION_MS: ${KAFKA_TOPIC_RETENTION_MS}
    networks:
      - lakehouse

volumes:
  kafka-data:
